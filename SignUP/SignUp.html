<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">  
   <link rel="stylesheet" href="SignUp.css">
</head>
<body>
  <section id="section-header">
  <header class="site-header">
    <div class="header-container">
      <a href="#" class="logo">
        <img src="mylogo.png"
          alt="StayHealthy Logo"
        />
      </a>
      <nav class="main-nav">
        <a href="LandingPage.html" class="nav-link">Home</a>
        <a href="#" class="nav-link">Appointments</a>
        <a href="#" class="nav-link">Records</a>
        <a href="#" class="nav-link">Reviews</a>
        <a href="#section-signup" class="nav-link active">Sign Up</a>
        <a href="#" class="nav-link">Log In</a>
      </nav>
    </div>
  </header>
</section>

<section id="section-signup" class="signup-section">
  <div class="signup-container">
    <div class="signup-card">
      <div class="card-header">
        <img
          src="mylogo.png"
          alt="StayHealthy Logo"
          class="card-logo"
        />
        <h1 class="card-title">Sign Up</h1>
        <p class="card-subtitle">Join StayHealthy in seconds!</p>
      </div>

      <form class="signup-form">
        <div class="form-group">
          <label>User</label>
          <div class="input-wrapper select-wrapper">
            <select class="form-control" required>
              <option value="" disabled selected>Select Role</option>
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>First Name</label>
          <div class="input-wrapper">
            <input
              type="text"
              class="form-control"
              placeholder="Enter your First Name"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Surname</label>
          <div class="input-wrapper">
            <input
              type="text"
              class="form-control"
              placeholder="Enter your Surname"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              class="form-control"
              placeholder="Enter your Email Address"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-wrapper phone-wrapper">
            <div class="country-code">
              <img
                src="${ASSET_PATH}/9dfcd13b56c6778c2b2bf72553e8af8fe59d39c4.png"
                alt="UK Flag"
                class="flag-icon"
              />
              <img
                src="${ASSET_PATH}/d62e49071a8b99faff88deb45d242dcd829528ac.png"
                alt="Dropdown"
                class="dropdown-icon"
              />
            </div>
            <input
              type="tel"
              class="form-control phone-input"
              placeholder="Enter your Phone Number"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              class="form-control"
              placeholder="Enter your Password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              aria-label="Toggle password visibility"
            >
              <img
                src="${ASSET_PATH}/0009175343f4d7f765dc0009505b530dd0674865.png"
                alt="Show/Hide"
                class="visibility-icon"
              />
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              class="form-control"
              placeholder="Confirm you Password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              aria-label="Toggle password visibility"
            >
              <img
                src="${ASSET_PATH}/0009175343f4d7f765dc0009505b530dd0674865.png"
                alt="Show/Hide"
                class="visibility-icon"
              />
            </button>
          </div>
        </div>

        <div class="terms-group">
          <label class="checkbox-container">
            <input type="checkbox" required />
            <span class="checkmark"></span>
            <span class="terms-text"
              >I agree to the <strong>Terms and Conditions</strong></span
            >
          </label>
        </div>

        <button type="submit" class="submit-btn">Create an Account</button>

        <p class="login-link">
          Already have an Account? <a href="#"><strong>Log In</strong></a>
        </p>
      </form>
    </div>
  </div>
</section>

</body>
</html>
